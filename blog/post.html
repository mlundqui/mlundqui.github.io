<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>~*~ Mike's Blog ~*~</title>
  <meta name="description" content="" />
  <link rel="icon" href="../assets/gratefuldead.gif" type="image/gif" />
  <link rel="preload" href="../styles/styles.css" as="style" />
  <link rel="stylesheet" href="../styles/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="../">~ML~<span class="dot">.</span></a>
      <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">☰</button>
      <nav id="site-nav" class="site-nav" aria-label="Primary">
        <a href="../">Home</a>
        <a href="../#projects">Projects</a>
        <a href="../blog/">Blog</a>
        <a href="../#about">About</a>
        <a href="../#contact">Contact</a>
      </nav>
    </div>
  </header>

  <div class="geocities-marquee">
    <marquee behavior="scroll" direction="left" scrollamount="4">
      ~*~ Mike's Blog ~*~ You are reading: <span id="marquee-title">...</span> ~*~
    </marquee>
  </div>

  <main class="container">
    <div class="geocities-section">
      <article class="post" id="post-content">
        <header>
          <h1 id="post-title"></h1>
          <p class="muted"><time id="post-date" datetime=""></time></p>
        </header>

        <hr class="rainbow-hr" />

        <div id="post-body">Loading...</div>

        <hr class="rainbow-hr" />

        <footer style="margin-top:2rem">
          <a href="/blog/">← Back to Blog</a>
        </footer>
      </article>
      <div style="text-align:center; margin-top:16px;">
        <img src="../assets/wizard2.gif" alt="Wizard" loading="lazy" style="width:60px;" />
        <img src="../assets/notebook.gif" alt="Notebook" loading="lazy" style="width:50px;" />
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-sunset">
      <img src="../assets/sunset2.gif" alt="Sunset" loading="lazy" />
    </div>
    <div class="hit-counter">
      Visitors: <span id="hit-count-footer">000427</span>
    </div>
    <div class="footer-badges">
      <a href="/">
        <img src="../assets/homebutton.gif" alt="Home" loading="lazy" />
      </a>
      <img src="../assets/area51bb.gif" alt="Area 51" loading="lazy" />
      <img src="../assets/linuxpenguin.gif" alt="Linux" loading="lazy" />
    </div>
    <small>© <span id="year"></span> Michael Lundquist. All rights reserved.</small>
    <div class="footer-easter-egg">
      <img src="../assets/homer.gif" alt="" loading="lazy" />
    </div>
  </footer>

  <script src="../js/main.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function () {
      const slug = new URLSearchParams(location.search).get('slug');
      if (!slug) { location.href = '/blog/'; return; }

      try {
        const res = await fetch('/blog/posts/posts.json');
        const posts = await res.json();
        const meta = posts.find(p => p.slug === slug);
        if (!meta) { location.href = '/blog/'; return; }

        document.title = meta.title + ' — ~*~ Mike\'s Blog ~*~';
        document.querySelector('meta[name="description"]').content = meta.description || '';
        document.getElementById('marquee-title').textContent = meta.title;
        document.getElementById('post-title').textContent = meta.title;

        const dateEl = document.getElementById('post-date');
        dateEl.setAttribute('datetime', meta.date);
        dateEl.textContent = new Date(meta.date + 'T00:00:00').toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric'
        });

        const mdRes = await fetch('/blog/posts/' + slug + '.md');
        if (!mdRes.ok) throw new Error('Post not found');
        const md = await mdRes.text();
        document.getElementById('post-body').innerHTML = marked.parse(md);
      } catch (e) {
        document.getElementById('post-body').innerHTML = '<p>Error loading post.</p>';
      }

      document.getElementById('year').textContent = new Date().getFullYear();
    })();
  </script>
</body>
</html>
