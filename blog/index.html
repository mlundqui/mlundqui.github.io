<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>~*~ Mike's Blog ~*~</title>
  <meta name="description" content="Blog posts by Michael Lundquist." />
  <link rel="icon" href="../assets/gratefuldead.gif" type="image/gif" />
  <link rel="preload" href="../styles/styles.css" as="style" />
  <link rel="stylesheet" href="../styles/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="../">~ML~<span class="dot">.</span></a>
      <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">☰</button>
      <nav id="site-nav" class="site-nav" aria-label="Primary">
        <a href="../">Home</a>
        <a href="../#projects">Projects</a>
        <a href="../blog/">Blog</a>
        <a href="../#about">About</a>
        <a href="../#contact">Contact</a>
      </nav>
    </div>
  </header>

  <div class="geocities-marquee">
    <marquee behavior="scroll" direction="left" scrollamount="4">
      ~*~ Mike's Blog ~*~ Thoughts from the void ~*~ Best viewed in Netscape Navigator 4.0 ~*~
    </marquee>
  </div>

  <main class="container">
    <div class="geocities-section">
      <div style="display:flex; align-items:center; justify-content:center; gap:12px;">
        <img src="../assets/books.gif" alt="Books" loading="lazy" style="width:40px;" />
        <h1>Blog</h1>
        <img src="../assets/wizard3.gif" alt="Wizard" loading="lazy" style="width:50px;" />
      </div>
      <hr class="rainbow-hr" />
      <ul class="post-list" id="post-list"></ul>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-sunset">
      <img src="../assets/sunset2.gif" alt="Sunset" loading="lazy" />
    </div>
    <div class="hit-counter">
      Visitors: <span id="hit-count-footer">000427</span>
    </div>
    <div class="footer-badges">
      <a href="/">
        <img src="../assets/homebutton.gif" alt="Home" loading="lazy" />
      </a>
      <img src="../assets/area51bb.gif" alt="Area 51" loading="lazy" />
      <img src="../assets/linuxpenguin.gif" alt="Linux" loading="lazy" />
    </div>
    <small>© <span id="year"></span> Michael Lundquist. All rights reserved.</small>
    <div class="footer-easter-egg">
      <img src="../assets/homer.gif" alt="" loading="lazy" />
    </div>
  </footer>

  <script src="../js/main.js" defer></script>
  <script>
    const posts = [
      { title: 'Hello, World', date: '2025-10-13', url: '../blog/posts/hello-world.html' },
    ];
    const ul = document.getElementById('post-list');
    posts.forEach(p => {
      const li = document.createElement('li');
      li.innerHTML = `
      <a class="post-card" href="${p.url}">
        <span class="post-card__title">${p.title}</span>
        <time class="post-card__date" datetime="${p.date}">${p.date}</time>
      </a>`;
      ul.appendChild(li);
    });
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
